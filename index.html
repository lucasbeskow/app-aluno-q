<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="style.css" rel="stylesheet">
    <link href="mobile.css" rel="stylesheet">


    <title>Login</title>
</head>

<body>

    <div class="container">

        <div class="hero">
            <p>
                "Educação não é o aprendizado de fatos,
                mas treinamento da mente para pensar."
                <span>Albert Einstein</span>
            </p>
        </div>

        <div class="formulario">
            <div>

                <h1>Bem-vindo de volta</h1>
                <p>Por favor, insira suas credenciais para acessar seu painel acadêmico</p>

                <form action="/login" method="post">

                    <label for="email">Endereço de e-mail</label>
                    <input name="email" id="email" type="text" placeholder="user@email.com" />

                    <label for="senha">
                        Senha 
                        <a href="esqueceu.html">Esqueceu?</a>
                    </label>
                    <input name="senha" id="senha" type="password">

                    <button type="submit">Entrar</button>

                </form>

                <p class="registre-se">Não tem uma conta? <a href="registro.html">Registre-se agora.</a></p>

            </div>
        </div>

    </div>

</body>

</html>
