<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>

    <div>
        <p>
            "Educação não é o aprendizado de fatos,
            mas treinamento da mente para pensar."
            <span>Albert Einstein</span>
        </p>
    </div>

    <div>
        <h1>Bem-vindo de volta</h1>
        <p>Por favor, insira suas credenciais para acessar seu painel acadêmico</p>

        <form action="/login" method="post">
            <label for="email">Endereço de e-mail</label>
            <input name="email" id="email" type="text" placeholder="user@email.com" />

            <label for="senha">Senha</label>
            <a href="esqueceu.html">Esqueceu?</a>
            <input name="senha" id="senha" type="password">

            <button type="submit">Entrar</button>

        </form>

        <p>Não tem uma conta? <a href="registro.html">Registre-se agora.</a></p>
    </div>

</body>

</html>
