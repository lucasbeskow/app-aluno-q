<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>

    <div>
        <p>
            "Educação não é o aprendizado de fatos,
            mas treinamento da mente para pensar."
            <span>Albert Einstein</span>
        </p>
    </div>

    <div>
        <h1>Cadastre-se</h1>
        <p>
            Passo 2 de 2. <br/>
            Por favor insira seus dados para finalizar e prosseguir.
        </p>

        <form action="/cadastrar" method="post">

            <label for="nome">Nome</label>
            <input name="nome" id="nome" type="text" placeholder="Nome completo" />

            <br/>

            <label for="telefone">Telefone</label>
            <input name="telefone" id="telefone" type="tel" placeholder="(99) 99999-9999" />
            
            <br/>

            <label for="email">E-mail</label>
            <input name="email" id="email" type="email" placeholder="Nome completo" />

            <br/>

            <label for="senha">Senha</label>
            <input name="senha" id="senha" type="password" />

            <br/>

            <button type="submit">Cadastrar</button>
        </form>
    </div>

</body>

</html>
